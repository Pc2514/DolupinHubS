<!DOCTYPE html>
<html>
<head>
  <title>重要なお知らせ</title>
</head>

<body style="font-family:sans-serif; text-align:center; margin-top:100px;">

  <h2>セキュリティ確認</h2>
  <p>あなたのアクセスは安全か確認されています。</p>
  <p>続行するには下のボタンを押してください。</p>

  <button onclick="start()" style="padding:10px 20px; font-size:16px;">
    続行
  </button>

  <div id="video" style="margin-top:20px;"></div>

  <script>
    function start() {
      document.body.innerHTML = `
        <h2>確認中...</h2>
        <p>しばらくお待ちください</p>
      `;

      setTimeout(() => {
        document.body.innerHTML = `
          <iframe width="100%" height="500"
          src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1"
          allow="autoplay"></iframe>
        `;
      }, 2000);
    }
  </script>

</body>
</html>
