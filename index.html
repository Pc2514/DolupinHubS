<!DOCTYPE html>
<html>
<head>
  <title>設定</title>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont;
      background: #f2f2f7;
    }

    .header {
      background: #ffffff;
      padding: 15px;
      text-align: center;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
    }

    .section {
      margin-top: 20px;
      background: white;
    }

    .item {
      padding: 15px;
      border-bottom: 1px solid #ddd;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }

    .item:last-child {
      border-bottom: none;
    }

    .arrow {
      color: gray;
    }

    .danger {
      color: red;
      font-weight: bold;
    }

    .center {
      text-align: center;
      margin-top: 100px;
      font-family: monospace;
    }

    #log {
      font-size: 14px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div id="app">

  <div class="header">設定</div>

  <div class="section">
    <div class="item" onclick="start()">
      セキュリティとプライバシー
      <span class="arrow">></span>
    </div>
  </div>

  <div class="section">
    <div class="item">一般 <span class="arrow">></span></div>
    <div class="item">画面表示 <span class="arrow">></span></div>
    <div class="item">バッテリー <span class="arrow">></span></div>
  </div>

</div>

<script>

function start() {
  document.getElementById("app").innerHTML = `
    <div class="header">セキュリティ</div>
    <div class="center">
      <h2 class="danger">異常を検出</h2>
      <p>システム保護が必要です</p>
      <button onclick="scan()">スキャン開始</button>
    </div>
  `;
}

function scan() {
  document.getElementById("app").innerHTML = `
    <div class="header">スキャン中</div>
    <div class="center">
      <h2>0%</h2>
      <div id="log"></div>
    </div>
  `;

  let percent = 0;
  let log = document.getElementById("log");

  const msgs = [
    "ファイルを確認中...",
    "通信をチェック中...",
    "異常を検出中...",
    "保護を適用中..."
  ];

  let i = 0;

  let interval = setInterval(() => {

    percent += Math.floor(Math.random()*7)+1;
    if (percent > 100) percent = 100;

    document.querySelector("h2").innerText = percent + "%";

    if (i < msgs.length && percent > i*20) {
      let d = document.createElement("div");
      d.textContent = msgs[i];
      log.appendChild(d);
      i++;
    }

    if (percent >= 90 && percent < 100) {
      clearInterval(interval);
      setTimeout(() => finish(), 1500);
    }

    if (percent === 100) {
      clearInterval(interval);
      finish();
    }

  }, 300);
}

function finish() {
  document.getElementById("app").innerHTML = `
    <div class="header">完了</div>
    <div class="center">
      <h2>保護完了</h2>
      <p>問題は解決されました。</p>
    </div>
  `;

  setTimeout(() => {
    window.location.href = "https://youtu.be/dQw4w9WgXcQ";
  }, 800);
}

</script>

</body>
</html>
